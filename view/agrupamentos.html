<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Configurar Agrupamentos</title>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        .linha {
            display: grid;
            grid-template-columns: 120px 300px auto;
            gap: 10px;
            align-items: center;
        }

        .linha input {
            padding: 5px;
            min-width: 0;
            box-sizing: border-box;
        }

        .codigo {
            width: 120px;
            max-width: 120px;
        }

        .descricao {
            width: 300px;
            max-width: 300px;
        }

        .topo {
            margin-bottom: 20px;
        }

        button {
            padding: 6px 10px;
            cursor: pointer;
        }

        .btnRemover {
            width: 30px;
            height: 30px;
            padding: 0;
            font-size: 16px;
            text-align: center;
            cursor: pointer;
        }
    </style>

</head>

<body>

    <div class="topo">
        <button id="btnVoltar">Voltar</button>
        <button id="btnSalvar">Salvar</button>
        <button id="btnAdicionar">+ Adicionar</button>
    </div>

    <div id="listaAgrupamentos"></div>

    <script src="../scripts/agrupamentos.js"></script>

    <script>
        const lista = document.getElementById('listaAgrupamentos');


        function criarLinha(codigo = '', destino = '') {
            const div = document.createElement('div');
            div.className = 'linha';

            div.innerHTML = `
        <input class="codigo" value="${codigo}" placeholder="Código">
        <input class="destino" value="${destino}" placeholder="Destino ou IGNORAR">
        <button class="btnRemover">❌</button>
    `;


            div.querySelector('.btnRemover').addEventListener('click', () => {
                div.remove();
            });

            return div;
        }

        function renderizar() {
            lista.innerHTML = '';

            Object.entries(agrupamentos).forEach(([codigo, destino]) => {
                lista.appendChild(criarLinha(codigo, destino));
            });
        }

        renderizar();

        document.getElementById('btnAdicionar').addEventListener('click', () => {
            lista.appendChild(criarLinha());
        });

        document.getElementById('btnVoltar').addEventListener('click', () => {
            window.history.back();
        });


        document.getElementById('btnSalvar').addEventListener('click', () => {
            const novoObjeto = {};

            document.querySelectorAll('.linha').forEach(linha => {
                const codigo = linha.querySelector('.codigo').value.trim();
                const destino = linha.querySelector('.destino').value.trim();

                if (codigo) {
                    novoObjeto[codigo] = destino;
                }
            });

            console.log('Novo agrupamentos:', novoObjeto);

            fetch('http://localhost:3000/salvar-agrupamentos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(novoObjeto)
            })
                .then(res => res.text())
                .then(() => alert('Dados SALVOS!'))
                .catch(err => {
                    console.error(err);
                    alert('Erro ao salvar');
                });
        });
    </script>

</body>

</html>
