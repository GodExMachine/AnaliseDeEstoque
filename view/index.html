<!DOCTYPE html>
<html lang="pt-BR">
<head>

<body>

<h2 id="tituloResumo"></h2>

<div class="top-controls">
 
  
  <button id="btnPDF">Gerar PDF</button>
  <label class="switch">
    <input type="checkbox" id="toggleLinhasExtras" />
    <span class="slider"></span>
  </label>
  <label for="toggleLinhasExtras" class="switch-label">Linhas extras</label>
  <input type="number" id="qtdLinhasExtras" value="4" min="1" style="width:60px; display:none;">
  <label for="qtdLinhasExtras" id="labelQtd" style="display:none;"></label>
</div>
<button id="btnConfigGrupo">Configurar Grupo</button>
<button id="btnConfigDescricao">Configurar Descrição</button>
<button id="btnConfigEX">Configurar EX</button>


<table>
<thead>
<tr>
<th>Código</th>
<th>Grupo</th>
<th>P</th>
<th>M</th>
<th>G</th>
<th>GG</th>
<th>EX</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>
<script src="../scripts/botao.js"></script>
<script src="../scripts/trocaEX.js"></script>
<script src="../scripts/grupos.js"></script>
<script src="../dados/resumo.js"></script>
<script src="../scripts/agrupamentos.js"></script>
<script src="../scripts/tabela.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
<script src="../scripts/gerarPDF.js"></script>



<script>
 const hoje = new Date();
const dataFormatada = hoje.toLocaleDateString();

</script>

</html>
